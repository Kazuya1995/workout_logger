{% extends "base.html" %}
{% block content %}
    <div class="content-section">
        <h2>Workout on {{ session.date }}</h2>
        <hr>
        <h3>Add a Set</h3>
        <form method="POST" id="add-set-form">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">Add Set</button>
        </form>
        <hr>
        <h3>Workout Sets</h3>
        <ul class="list-group">
            {% for set in session.sets.all %}
                <li class="list-group-item">{{ set }}</li>
            {% empty %}
                <li class="list-group-item">No sets logged for this session yet.</li>
            {% endfor %}
        </ul>
    </div>

    <script>
        document.getElementById('id_category').addEventListener('change', function() {
            const category = this.value;
            const url = `/ajax/get_exercises_by_category/?category=${category}`;

            fetch(url)
                .then(response => response.json())
                .then(data => {
                    const exerciseSelect = document.getElementById('id_exercise');
                    exerciseSelect.innerHTML = '<option value="">---------</option>';
                    data.forEach(exercise => {
                        const option = new Option(exercise.name, exercise.id);
                        exerciseSelect.add(option);
                    });
                });
        });
    </script>
{% endblock content %}
